<!-- templates/chat/index.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 법률 비서</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; height: 100vh; margin: 0; }
        .chat-container { width: 100%; max-width: 800px; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; margin: 20px; border-radius: 10px; }
        .chat-box { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 14px 18px; border-radius: 15px; max-width: 85%; line-height: 1.6; font-size: 15px; }
        .user-msg { background-color: #212121; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot-msg { background-color: #f4f4f4; color: #111; align-self: flex-start; border-bottom-left-radius: 2px; }
        .input-area { display: flex; padding: 20px; background: #fff; border-top: 1px solid #eee; }
        .input-area input { flex: 1; padding: 15px; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 15px; }
        .input-area button { padding: 15px 25px; margin-left: 10px; background-color: #212121; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .loading { font-size: 13px; color: #888; align-self: flex-start; display: none; margin-left: 5px; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-box" id="chatBox">
        <div class="message bot-msg">주인님, 무엇을 도와드릴까요?</div>
        <div class="loading" id="loadingIndicator">답변을 생성하는 중입니다...</div>
    </div>
    
    <div class="input-area">
        <input type="text" id="userInput" placeholder="질문을 입력하세요..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">전송</button>
    </div>
</div>

<script>
    async function sendMessage() {
        const inputField = document.getElementById('userInput');
        const chatBox = document.getElementById('chatBox');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const prompt = inputField.value.trim();

        if (!prompt) return;

        appendMessage(prompt, 'user-msg');
        inputField.value = '';
        loadingIndicator.style.display = 'block';
        chatBox.appendChild(loadingIndicator);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            // urls.py에 설정한 '/api/chat/' 엔드포인트로 요청을 보냅니다.
            const response = await fetch('/api/chat/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: prompt })
            });

            const data = await response.json();
            loadingIndicator.style.display = 'none';
            
            if (response.ok) {
                appendMessage(data.reply, 'bot-msg');
            } else {
                appendMessage("오류: " + (data.error || "알 수 없는 에러가 발생했습니다."), 'bot-msg');
            }
        } catch (error) {
            loadingIndicator.style.display = 'none';
            appendMessage("백엔드 서버와 통신할 수 없습니다.", 'bot-msg');
        }
    }

    function appendMessage(text, className) {
        const chatBox = document.getElementById('chatBox');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${className}`;
        msgDiv.innerText = text;
        chatBox.insertBefore(msgDiv, document.getElementById('loadingIndicator'));
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') sendMessage();
    }
</script>
</body>
</html>
